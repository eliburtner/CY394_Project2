<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      max-width: 500px;
    }
    label, input, button {
      display: block;
      width: 100%;
      margin-top: 10px;
      padding: 8px;
    }
    #message {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Login</h1>

  <form id="loginForm">
    <label>Username</label>
    <input type="text" id="username" required>

    <label>Password</label>
    <input type="password" id="password" required>

    <button type="submit">Login</button>
  </form>

  <p id="message"></p>

  <script>
    const loginForm = document.getElementById("loginForm");
    const message = document.getElementById("message");

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const payload = {
        username: document.getElementById("username").value,
        password: document.getElementById("password").value
      };

      const res = await fetch("/api/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const data = await res.json();

      if (!res.ok) {
        message.style.color = "red";
        message.textContent = data.error;
        return;
      }

      localStorage.setItem("user_id", data.user_id);
      localStorage.setItem("username", data.username);
      localStorage.setItem("role", data.role);

      if (data.table_id) {
        localStorage.setItem("table_id", data.table_id);
      }
      
      if (data.table_num) {
        localStorage.setItem("table_num", data.table_num);
      }

      if (data.role === "Floater") {
        window.location.href = "floater.html";
      } else if (data.role === "Table Commandant") {
        window.location.href = "commandant.html";
      } else if (data.role === "Admin") {
        window.location.href = "admin.html";
      }
    });
  </script>
</body>
</html>
