<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Table Commandant Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      max-width: 600px;
    }
    label, input, button {
      display: block;
      width: 100%;
      margin-top: 10px;
      padding: 8px;
    }
    #message {
      margin-top: 20px;
      font-weight: bold;
    }
    #tableInfo {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <h1>Table Commandant Dashboard</h1>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>

  <div id="tableInfo">
    <p><strong>Assigned Table ID:</strong> <span id="tableIdDisplay"></span></p>
  </div>

  <h2>Update Available Seats</h2>
  <form id="seatForm">
    <label>Available Seats</label>
    <input type="number" id="available_seats" min="0" required>

    <button type="submit">Update Seats</button>
  </form>

  <p id="message"></p>

  <script>
    const userId = localStorage.getItem("user_id");
    const username = localStorage.getItem("username");
    const role = localStorage.getItem("role");
    const tableId = localStorage.getItem("table_id");

    if (!userId || role !== "Table Commandant") {
      window.location.href = "login.html";
    }

    document.getElementById("welcome").textContent = `Welcome, ${username}`;
    document.getElementById("tableIdDisplay").textContent = tableId || "Not found";

    document.getElementById("seatForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const availableSeats = parseInt(document.getElementById("available_seats").value);

      const res = await fetch("/api/update-seats", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          table_id: parseInt(tableId),
          user_id: parseInt(userId),
          available_seats: availableSeats
        })
      });

      const data = await res.json();
      const message = document.getElementById("message");

      if (res.ok) {
        message.style.color = "green";
      } else {
        message.style.color = "red";
      }

      message.textContent = data.message || data.error;
    });

    function logout() {
      localStorage.clear();
      window.location.href = "login.html";
    }
  </script>
</body>
</html>
