apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: ay262-elijah-namespace
spec:
  serviceName: mysql
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:5.7
        imagePullPolicy: Always
        ports:
        - containerPort: 3306
          name: mysql
        readinessProbe:
          tcpSocket:
            port: 3306
          initialDelaySeconds: 3
          periodSeconds: 3
      
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "password"
        - name: MYSQL_DATABASE
          value: "phase2-mysql-database"

        resources:
          requests:
            cpu: "100m"
            memory: "512Mi"
            ephemeral-storage: "512Mi"
          limits:
            cpu: "300m"
            memory: "1Gi"
            ephemeral-storage: "1Gi"
        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql

        securityContext:
          allowPrivilegeEscalation: false

  volumeClaimTemplates:
  - metadata:
      name: mysql-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi
      storageClassName: local-path
